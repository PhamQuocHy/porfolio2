<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio cá nhân - Developer & Designer">
  <title>Portfolio | Hoa Anh Thư</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Momo+Trust+Sans:wght@200..800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="header"></div>

  <main>
    <div id="hero"></div>
    <div id="about"></div>
    <div id="process"></div>
    <div id="services"></div>
    <div id="achievements"></div>
    <div id="projects"></div>
  </main>

  <div id="contact"></div>

  <div class="project-modal" id="projectModal" aria-hidden="true" aria-labelledby="projectModalTitle">
    <div class="project-modal__backdrop" data-close-modal></div>
    <div class="project-modal__dialog" role="dialog" aria-modal="true">
      <button type="button" class="project-modal__close" aria-label="Đóng chi tiết dự án" data-close-modal>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="project-modal__layout">
        <aside class="project-modal__sidebar" aria-hidden="true">
          <p class="project-modal__sidebar-label" id="projectModalSidebar"></p>
        </aside>
        <div class="project-modal__main">
          <header class="project-modal__header">
            <h2 class="project-modal__title" id="projectModalTitle"></h2>
            <p class="project-modal__subtitle" id="projectModalSubtitle"></p>
          </header>
          <div class="project-modal__case" id="projectModalCase" hidden></div>
          <div class="project-modal__gallery" id="projectModalGallery"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="project-modal trust-modal" id="trustModal" aria-hidden="true" aria-labelledby="trustModalTitle">
    <div class="project-modal__backdrop" data-close-trust-modal></div>
    <div class="project-modal__dialog" role="dialog" aria-modal="true">
      <button type="button" class="trust-modal__nav trust-modal__nav--prev" id="trustModalPrev" aria-label="Thương hiệu trước">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M14 6l-6 6 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="trust-modal__nav trust-modal__nav--next" id="trustModalNext" aria-label="Thương hiệu tiếp theo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10 6l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="project-modal__close" aria-label="Đóng" data-close-trust-modal>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="project-modal__layout">
        <aside class="project-modal__sidebar" aria-hidden="true">
          <p class="project-modal__sidebar-label" id="trustModalSidebar"></p>
        </aside>
        <div class="project-modal__main">
          <header class="project-modal__header">
            <h2 class="project-modal__title" id="trustModalTitle"></h2>
            <p class="project-modal__subtitle" id="trustModalSubtitle"></p>
          </header>
          <div class="project-modal__case" id="trustModalCase" hidden></div>
          <div class="project-modal__gallery" id="trustModalGallery"></div>
          <p class="trust-modal__counter" id="trustModalCounter" aria-live="polite"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/include.js"></script>
  <script src="js/project-modal.js"></script>
  <script src="js/trust-modal.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
