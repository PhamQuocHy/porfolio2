<section id="contact" class="contact section">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Liên hệ</span>
      <h2 class="section-title">Hãy kết nối với tôi</h2>
    </div>
    <div class="contact-grid">
      <div class="contact-info">
        <h3>Bạn có dự án thú vị?</h3>
        <p>
          Tôi luôn sẵn sàng lắng nghe ý tưởng mới và cơ hội hợp tác.
          Hãy gửi tin nhắn và tôi sẽ phản hồi sớm nhất có thể.
        </p>
        <ul class="contact-details">
          <li>
            <span class="contact-icon">📧</span>
            <div>
              <strong>Email</strong>
              <a href="mailto:nguyenvana@email.com">nguyenvana@email.com</a>
            </div>
          </li>
          <li>
            <span class="contact-icon">📱</span>
            <div>
              <strong>Điện thoại</strong>
              <a href="tel:+84901234567">+84 901 234 567</a>
            </div>
          </li>
          <li>
            <span class="contact-icon">📍</span>
            <div>
              <strong>Địa chỉ</strong>
              <span>Hà Nội, Việt Nam</span>
            </div>
          </li>
        </ul>
        <div class="social-links">
          <a href="#" aria-label="GitHub">GitHub</a>
          <a href="#" aria-label="LinkedIn">LinkedIn</a>
          <a href="#" aria-label="Facebook">Facebook</a>
        </div>
      </div>
      <form class="contact-form" action="#" method="post">
        <div class="form-group">
          <label for="name">Họ và tên</label>
          <input type="text" id="name" name="name" placeholder="Nhập họ tên của bạn" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label for="subject">Chủ đề</label>
          <input type="text" id="subject" name="subject" placeholder="Chủ đề liên hệ">
        </div>
        <div class="form-group">
          <label for="message">Tin nhắn</label>
          <textarea id="message" name="message" rows="5" placeholder="Nội dung tin nhắn..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Gửi tin nhắn</button>
      </form>
    </div>
  </div>
</section>
